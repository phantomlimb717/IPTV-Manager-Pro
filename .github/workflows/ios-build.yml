name: Build and Test iOS App

on:
  push:
    branches:
      - main
      - feature-port-ios-pro
    paths:
      - 'IPTVManager/**'
      - 'Package.swift'
      - '.github/workflows/ios-build.yml'
  pull_request:
    paths:
      - 'IPTVManager/**'
      - 'Package.swift'
      - '.github/workflows/ios-build.yml'

jobs:
  build-and-test-ios:
    runs-on: macos-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.3'

      - name: Build iOS Application
        run: |
          xcodebuild build -scheme IPTVManagerApp -destination 'generic/platform=iOS'
